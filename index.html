<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Construct 2 Addons Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation for custom C2 behaviors and plugins">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'C2 Addons',
      repo: 'https://github.com/your-username/your-repo-name', // [Action] Replace with your actual repo URL
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        noData: 'No results!',
        paths: 'auto',
        placeholder: 'Search documentation...'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Syntax Highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <style>
    :root {
      --theme-color: #3498db;
    }
    .sidebar-nav li > a { font-weight: bold; }
  </style>
</body>
</html>
