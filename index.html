<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Construct 2 Addons Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation for custom C2 behaviors and plugins">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css">
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'C2 Addons',
      repo: 'https://github.com/pigmalien/c2plugindev', // [Action] Replace with your actual repo URL
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        noData: 'No results!',
        paths: 'auto',
        placeholder: 'Search documentation...',
        depth: 6,
        hideOtherSidebarContent: false
      },
      darklightTheme: {
        defaultTheme : 'dark',
        siteFont : 'PT Sans',
        codeFontFamily : 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize : '17px',
        dark: {
          accent: '#3498db',
          toogleBackground : '#ffffff',
          background: '#091a28',
          textColor: '#b0b1b1',
          codeTextColor: '#ffffff',
          codeBackgroundColor: '#0e2233',
          borderColor: '#0d2538',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          prevNextBorderColor: '#3498db',
          codeTypeColor: '#ffffff',
          graphColor: '#3b8d99',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#3498db',
          toogleBackground : '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
          codeTextColor: '#525252',
          codeBackgroundColor: '#f8f8f8',
          borderColor: 'rgba(0,0,0,.07)',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          prevNextBorderColor: '#3498db',
          codeTypeColor: '#091a28',
          graphColor: '#3b8d99',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Dark Mode Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  <!-- Syntax Highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
